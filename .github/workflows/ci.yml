name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-check:
    name: Build, lint, accessibility & link checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Link check (internal)
        run: npm run test:links

      - name: Start preview server
        run: npm run preview &

      - name: Wait for preview server
        run: npx wait-on http://localhost:4321/ --timeout 60000

      - name: Accessibility check (pa11y-ci)
        run: npm run test:a11y
